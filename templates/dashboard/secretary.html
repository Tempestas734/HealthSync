<!DOCTYPE html>
<html>
<head>
    <title>Secretary Dashboard</title>
</head>
<body>
    <h2>Dashboard Secretaire</h2>
    <p>Bienvenue {{ staff_profile.first_name|default:"Utilisateur" }}</p>
    <p>Role : {{ staff_profile.role_display_name|default:"Personnel" }}</p>
    <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button type="submit">Logout</button>
    </form>
</body>
</html>
